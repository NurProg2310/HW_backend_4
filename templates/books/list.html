<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
</head>
<body>
    <h1>Список книг</h1>

    <a href="/books/new">Добавить книгу</a>

    <ul>
        {% for book in books %}
            <li>
                <a href="/books/{{ book.id }}">{{ book.title }}</a>
            </li>
        {% endfor %}
    </ul>

    <div style="margin-top: 20px;">
        {% if page > 1 %}
            <a href="/books?page={{ page - 1 }}">Назад</a>
        {% endif %}

        <span style="margin: 0 10px;">
            Страница {{ page }} из {{ total_pages }}
        </span>

        {% if page < total_pages %}
            <a href="/books?page={{ page + 1 }}">Вперед</a>
        {% endif %}
    </div>
</body>
</html>
